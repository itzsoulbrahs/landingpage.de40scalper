.site-wrapper {
  align-items: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
  z-index: 2;
  width: 100%;
}

.site-main {
  align-items: center;
  display: flex;
  flex-grow: 0;
  flex-shrink: 0;
  justify-content: center;
  max-width: 100%;
  position: relative;
  z-index: 1;
  width: 100%;
}

.site-main > .inner {
  max-width: 100%;
  position: relative;
  width: 62rem;
  z-index: 1;
  padding: 6rem;
}

/* TOP container - gradient background with pattern */

  background-repeat: repeat, repeat;
  border-top-left-radius: 2.5rem;
  border-top-right-radius: 2.5rem;
  margin-bottom: 0 !important;
}

.container-top-inner {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 3rem;
  padding: 3.25rem 6rem;
  width: 100%;
  max-width: 62rem;
}

.container-top-inner > .col-logo {
  width: calc(33% + 1.5rem);
  display: flex;
  justify-content: center;
  align-items: center;
}

.container-top-inner > .col-text {
  width: calc(67% - 1.5rem);
  flex: 1;
}

/* Logo image - exact style from source */
.logo-frame {
  display: inline-block;
  overflow: hidden;
  vertical-align: top;
  width: 100%;
  border-radius: 100%;
  border: 5px solid #FFFFFF;
  max-width: 160px;
}

.logo-frame img {
  max-width: 100%;
  vertical-align: top;
  width: inherit;
  display: block;
}

/* Title - Audiowide font, uppercase */
.title-text {
  text-transform: uppercase;
  color: #FFFFFF;
  font-family: 'Audiowide', sans-serif;
  letter-spacing: -0.125rem;
  width: 100%;
  font-size: 2.375em;
  line-height: 1.375;
  font-weight: 400;
  margin-bottom: 1rem;
}

/* Description - Inter light */
.desc-text {
  color: #FFFFFF;
  font-family: 'Inter', sans-serif;
  font-size: 1em;
  line-height: 1.875;
  font-weight: 300;
}

/* BOTTOM container - white */
.container-bottom {
  display: flex;
  width: 100%;
  align-items: center;
  justify-content: center;
  background-color: #FFFFFF;
  border-bottom-left-radius: 2.5rem;
  border-bottom-right-radius: 2.5rem;
  margin-top: 0 !important;
}

.container-bottom-inner {
  padding: 0.75rem 4rem 0.75rem 4rem;
  width: 100%;
  max-width: 62rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container-bottom-inner > * {
  margin-top: 1.5rem;
  margin-bottom: 1.5rem;
}

.container-bottom-inner > *:first-child { margin-top: 0 !important; }
.container-bottom-inner > *:last-child { margin-bottom: 0 !important; }

/* Tagline text */
.tagline-text {
  text-align: center;
  color: rgba(20,20,20,0.741);
  font-family: 'Lato', sans-serif;
  font-size: 1.25em;
  line-height: 1.5;
  font-weight: 400;
}

/* Buttons list */
.buttons-list {
  list-style: none;
  display: flex;
  justify-content: center;
  gap: 0.75rem;
  flex-direction: row;
  flex-wrap: wrap;
  margin: 0.5rem 0;
  width: 100%;
}

.buttons-list:first-child { margin-top: 0 !important; }
.buttons-list:last-child { margin-bottom: 0 !important; }

/* Telegram button style */
.btn-telegram {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24.875rem;
  height: 4rem;
  line-height: 4rem;
  padding: 0 0.5rem;
  font-family: 'Inter', sans-serif;
  font-size: 1.5em;
  font-weight: 400;
  border-radius: 1.875rem;
  color: #0086BF;
  border: solid 3px rgba(36,36,36,0.741);
  background: transparent;
  text-decoration: none;
  transition: transform 0.25s ease, color 0.25s ease, background-color 0.25s ease, border-color 0.25s ease;
  white-space: nowrap;
  cursor: pointer;
}

.btn-telegram svg {
  display: block;
  fill: #0086BF;
  flex-shrink: 0;
  height: 100%;
  min-width: 16px;
  pointer-events: none;
  width: 1.5em;
  margin-left: -0.125em;
  margin-right: calc(0.5em);
  transition: fill 0.25s ease;
}

.btn-telegram:hover {
  border-color: #000000 !important;
  color: #000000 !important;
  transform: scale(1.06);
}
.btn-telegram:hover svg { fill: #000000 !important; }

/* Buy Now button style */
.btn-buy {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 25.75rem;
  height: 4.875rem;
  padding: 0 0.5rem;
  font-family: 'Inter', sans-serif;
  font-size: 1.5em;
  font-weight: 400;
  border-radius: 1.875rem;
  border: 1px solid #FFE500;
  box-shadow: 0rem 0rem 0.5rem 0rem #8C8C8C;
  background-color: #363636;
  color: #FFFFFF;
  text-decoration: none;
  transition: transform 0.25s ease, color 0.25s ease, background-color 0.25s ease, border-color 0.25s ease;
  white-space: nowrap;
  cursor: pointer;
}

.btn-buy svg {
  display: block;
  fill: #FFFFFF;
  flex-shrink: 0;
  height: 100%;
  min-width: 16px;
  pointer-events: none;
  width: 1.625em;
  margin-left: -0.125em;
  margin-right: 0.75rem;
  transition: fill 0.25s ease;
}

.btn-buy:hover {
  background-color: #363636 !important;
  transform: scale(1.06);
}

/* Responsive */
@media (max-width: 1680px) { html { font-size: 12pt; } }
@media (max-width: 1280px) { html { font-size: 12pt; } }
@media (max-width: 980px)  { html { font-size: 10pt; } }
@media (max-width: 736px) {
  html { font-size: 12pt; }
  .site-main > .inner { padding: 2rem 1rem; }
  .container-top { min-height: 17.25rem; border-radius: 2.5rem 2.5rem 0 0; }
  .container-top-inner {
    flex-direction: column !important;
    align-items: center;
    text-align: center;
    padding: 2.5rem 2rem;
    gap: 1.5rem;
  }
  .container-top-inner > .col-logo,
  .container-top-inner > .col-text { width: 100% !important; text-align: center; }
  .logo-frame { max-width: 6.75rem; }
  .title-text { font-size: 2em; letter-spacing: -0.109375rem; }
  .desc-text { font-size: 0.875em; }
  .tagline-text { font-size: 1em; }
  .container-bottom-inner { padding: 1.75rem 2rem; }
  .btn-telegram { font-size: 1.25em; }
  .btn-buy { font-size: 1.25em; }
  .buttons-list { margin: 2rem 0; }
}
@media (max-width: 360px) {
  .site-main > .inner { padding: 1.5rem 0.75rem; }
  .container-top-inner { padding: 1.875rem 1.5rem; }
  .container-bottom-inner { padding: 1.3125rem 1.5rem; }
  .title-text { font-size: 2em; }
}
</style>
</head>
